<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cwhoppe — Showroom</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
<style>
  :root{
    --surface-0:#000000;
    --surface-1:#0D0D0D;
    --surface-2:#1A1A1A;
    --text-primary:#F2F2F0;
    --text-secondary:#A8A8A4;
    --text-muted:#6E6E6A;
    --border:#2A2A28;
    --border-strong:#3D3D3A;
    --bg-accent:#1E2B14;
    --text-accent:#97C459;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--surface-0);
    font-family:'Inter',sans-serif;
    color:var(--text-primary);
    display:flex;
    justify-content:center;
    padding:40px 16px;
    min-height:100vh;
  }
  .phone{
    background:var(--surface-1);
    border-radius:24px;
    padding:20px;
    max-width:380px;
    width:100%;
    box-shadow:0 20px 50px rgba(0,0,0,0.08);
  }
  .statusbar{display:flex;justify-content:flex-end;align-items:center;margin-bottom:20px;}
  .statusbar .time{font-size:11px;letter-spacing:1.5px;color:var(--text-muted);}
  .statusbar .icons{display:flex;gap:6px;color:var(--text-muted);font-size:14px;}
  .header{margin-bottom:24px;}
  .eyebrow{font-size:12px;letter-spacing:2px;color:var(--text-secondary);margin:0 0 4px;text-transform:uppercase;}
  .wordmark{font-family:'Fraunces',serif;font-size:40px;font-weight:500;margin:0;line-height:1;}
  .tabs{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;}
  .tab{border-radius:20px;padding:6px 14px;font-size:13px;white-space:nowrap;color:var(--text-secondary);cursor:pointer;transition:all .2s;border:0.5px solid transparent;}
  .tab:hover:not(.active){background:var(--surface-2);opacity:.7;}
  .category-content{display:none;}
  .category-content.active{display:block;}
  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text-muted);}
  .empty-state i{font-size:48px;margin-bottom:16px;color:var(--text-secondary);}
  .empty-state p{font-size:14px;margin:0;text-align:center;}
  .tab.active{background:var(--surface-2);border:0.5px solid var(--border-strong);color:var(--text-primary);}
  .grid{display:grid;grid-template-columns:1fr;gap:12px;}
  .card{background:var(--surface-2);border:0.5px solid var(--border);border-radius:12px;padding:12px;}
  .card .num{font-size:11px;color:var(--text-muted);margin:0 0 8px;}
  .card .thumb{height:220px;display:flex;align-items:center;justify-content:center;background:var(--surface-1);border-radius:8px;margin-bottom:10px;}
  .card .thumb i{font-size:32px;color:var(--text-secondary);}
  .card .name{font-size:14px;font-weight:500;margin:0 0 2px;}
  .card .price{font-size:13px;color:var(--text-secondary);margin:0;}
  .badge{display:inline-block;margin-top:6px;background:var(--bg-accent);color:var(--text-accent);font-size:11px;padding:2px 8px;border-radius:6px;}
  .tabbar{display:flex;justify-content:space-around;margin-top:24px;padding-top:14px;border-top:0.5px solid var(--border);}
  .tabbar i{font-size:20px;color:var(--text-muted);}
  .tabbar i.active{color:var(--text-primary);}
</style>
<base target="_blank">
</head>
<body>
<div class="phone">
<div class="statusbar">
<div class="icons">
<i class="ti ti-menu-2"></i>
<i class="ti ti-search"></i>
</div>
</div>
<div class="header">
<p class="eyebrow">Showroom</p>
<p class="wordmark">Cwhoppe</p>
</div>
<div class="tabs">
<span class="tab active" onclick="switchCategory('erkek',this)">Erkek Model</span>
<span class="tab" onclick="switchCategory('kadin',this)">Kadın Model</span>
</div>
<div id="erkek" class="category-content active">
<div class="grid">
<div class="card">
<p class="num">01</p>
<div class="thumb"><div class="thumb"><i class="ti ti-photo"></i></div></div>
<p class="name">Priv Head</p>
<p class="price">300TL</p>
</div>
<div class="card">
<p class="num">02</p>
<div class="thumb"><div class="thumb"><i class="ti ti-photo"></i></div></div>
<p class="name">Priv Body</p>
<p class="price">250TL</p>
</div>
</div>

<div id="kadin" class="category-content">
<div class="empty-state">
<i class="ti ti-shirt"></i>
<p>Kadın Model kategorisi şu anda boş.</p>
<p style="margin-top:8px;font-size:12px;">Yakında eklenecek...</p>
</div>
</div>
</div>
<div class="tabbar">
<i class="ti ti-home active"></i>
<i class="ti ti-search"></i>
<i class="ti ti-shopping-bag"></i>
<i class="ti ti-user"></i>
</div>
<div style="text-align:center; margin-top:20px;">
<p style="font-size:11px; color:var(--text-muted); margin:0 0 4px;">Discord Showroom</p>
<a href="https://discord.gg/JhVRPuDzQb" style="font-size:11px; color:var(--text-secondary);">https://discord.gg/JhVRPuDzQb</a>
</div>
</div>
<script>
function switchCategory(cat,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.category-content').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(cat).classList.add('active');
}
</script>
</body>
</html>
