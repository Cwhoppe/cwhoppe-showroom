<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SHOWROOM - Cwhoppe</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background:#0f0f12; color:#f3f3f3; }
    header { padding: 24px; text-align:center; border-bottom: 1px solid #222; }
    h1 { margin: 0 0 8px; font-size: 28px; }
    .subtitle { color:#bbb; }

    /* Sekmeler */
    .tabs { display:flex; justify-content:center; gap:12px; margin:16px 0; }
    .tab-btn {
      padding:10px 16px; border:1px solid #333; background:#16161a; color:#ddd;
      border-radius:8px; cursor:pointer; transition:all .2s;
    }
    .tab-btn:hover { background:#1f1f25; }
    .tab-btn.active { background:#4c8bf5; color:#fff; border-color:#4c8bf5; }

    /* Bölümler */
    .tab-panel { display:none; padding:24px; max-width:980px; margin:0 auto; }
    .tab-panel.active { display:block; }

    /* Kartlar / ürünler */
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:16px; }
    .card {
      background:#16161a; border:1px solid #2a2a30; border-radius:12px; padding:16px;
    }
    .card h3 { margin:0 0 8px; font-size:18px; }
    .price { color:#9ad96a; font-weight:bold; }

    /* Footer / Discord */
    .footer { text-align:center; padding:24px; border-top:1px solid #222; color:#bbb; }
    .link { color:#4c8bf5; text-decoration:none; }
    .link:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <header>
    <div>SHOWROOM</div>
    <h1># Cwhoppe</h1>
    <div class="subtitle">Erkek Model</div>
  </header>

  <!-- Sekme düğmeleri -->
  <nav class="tabs" role="tablist" aria-label="Kategoriler">
    <button class="tab-btn active" role="tab" aria-selected="true" aria-controls="panel-erkek" id="tab-erkek">
      Erkek Modelleri
    </button>
    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="panel-kadin" id="tab-kadin">
      Kadın Modelleri
    </button>
  </nav>

  <!-- Erkek Modelleri -->
  <section id="panel-erkek" class="tab-panel active" role="tabpanel" aria-labelledby="tab-erkek">
    <div class="grid">
      <article class="card">
        <h3>Priv Head</h3>
        <div>Açıklama: Priv Head</div>
        <div class="price">300 TL</div>
      </article>

      <article class="card">
        <h3>Priv Body</h3>
        <div>Açıklama: Priv Body</div>
        <div class="price">250 TL</div>
      </article>
    </div>
  </section>

  <!-- Kadın Modelleri (yeni) -->
  <section id="panel-kadin" class="tab-panel" role="tabpanel" aria-labelledby="tab-kadin">
    <div class="grid">
      <!-- Örnek ürünler: içerikleri kendi modellerinle değiştir -->
      <article class="card">
        <h3>Priv Head (Kadın)</h3>
        <div>Açıklama: Priv Head (Kadın)</div>
        <div class="price">300 TL</div>
      </article>

      <article class="card">
        <h3>Priv Body (Kadın)</h3>
        <div>Açıklama: Priv Body (Kadın)</div>
        <div class="price">250 TL</div>
      </article>
    </div>
  </section>

  <footer class="footer">
    Discord Showroom:
    <a class="link" href="[discord.gg](https://discord.gg/JhVRPuDzQb)" target="_blank" rel="noopener">[discord.gg](https://discord.gg/JhVRPuDzQb)</a>
  </footer>

  <script>
    // Basit sekme geçişi
    const tabs = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');

    function activateTab(targetId, btn) {
      tabs.forEach(b => {
        const selected = b === btn;
        b.classList.toggle('active', selected);
        b.setAttribute('aria-selected', selected ? 'true' : 'false');
      });
      panels.forEach(p => {
        p.classList.toggle('active', p.id === targetId);
      });
      // Başlıktaki alt metni kategoriye göre güncelle (isteğe bağlı)
      const subtitle = document.querySelector('.subtitle');
      subtitle.textContent = btn.textContent.trim().replace('Modelleri', 'Model');
    }

    tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        const target = btn.getAttribute('aria-controls');
        activateTab(target, btn);
        // Odak yönetimi (erişilebilirlik)
        document.getElementById(target).focus?.();
      });
    });

    // Klavye ile sekme gezinme (sol/sağ ok)
    document.addEventListener('keydown', (e) => {
      const activeIndex = [...tabs].findIndex(t => t.classList.contains('active'));
      if (e.key === 'ArrowRight' || e.key === 'ArrowLeft') {
        e.preventDefault();
        const dir = e.key === 'ArrowRight' ? 1 : -1;
        const next = (activeIndex + dir + tabs.length) % tabs.length;
        tabs[next].click();
        tabs[next].focus();
      }
    });
  </script>
</body>
</html>
